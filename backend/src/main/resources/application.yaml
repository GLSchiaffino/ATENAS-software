# ============================================
# ATENAS Backend — Configuracion base
# Este archivo SI va al repositorio.
# NO contiene secretos: lee las credenciales desde variables
# de entorno o desde application-local.yml (ignorado por Git).
# ============================================

spring:
  application:
    name: atenas-backend

  # Perfil activo por defecto: carga application-local.yml encima de este archivo
  profiles:
    active: local

  # ---- Conexion a la base de datos ----
  # Los valores reales NO estan aca. Se leen de variables de entorno.
  # La sintaxis ${VARIABLE:valor_por_defecto} significa:
  #   "usa la variable de entorno VARIABLE; si no existe, usa el valor por defecto"
  datasource:
    url: ${ATENAS_DB_URL:jdbc:postgresql://localhost:5432/atenas}
    username: ${ATENAS_DB_USER:atenas}
    password: ${ATENAS_DB_PASS:}
    driver-class-name: org.postgresql.Driver

  # ---- JPA / Hibernate ----
  jpa:
    hibernate:
      # validate: Hibernate verifica que las entities coincidan con las tablas,
      #           pero NO modifica el schema. Tu schema.sql es la fuente de verdad.
      ddl-auto: validate
    # Muestra en consola el SQL que Hibernate genera (util para aprender)
    show-sql: true
    properties:
      hibernate:
        # Formatea el SQL para que sea legible
        format_sql: true

# ---- Servidor ----
server:
  port: 8080
