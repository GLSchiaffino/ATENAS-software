
<style>
h2.sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0 }
.section-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  margin: 0 0 8px;
}
.diagram-wrap {
  overflow: auto;
  min-height: 120px;
}
.err-msg {
  font-size: 12px;
  color: var(--color-text-danger);
  padding: 8px 0;
}
</style>

<h2 class="sr-only">Diagrama 2 — Módulo financiero, inventario y sistema — ATENAS</h2>

<p class="section-label">Diagrama 2 — Financiero · Inventario · Sistema · V2 Juegos (actualizado)</p>
<div class="diagram-wrap" id="erd2"><span style="font-size:12px;color:var(--color-text-tertiary)">Cargando…</span></div>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';

const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '16px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efe8',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    attributeBackgroundColorEven: dark ? '#222220' : '#faf9f5',
    attributeBackgroundColorOdd: dark ? '#2a2a28' : '#f1efe8',
  },
});

const erd2def = `erDiagram
  VENTA {
    uuid id PK
  }
  USUARIO {
    uuid id PK
    enum rol
  }
  SEMANA_LABORAL {
    uuid id PK
    date fecha_inicio
    enum estado
  }
  CUPON {
    uuid id PK
  }
  EQUIPO {
    uuid id PK
  }
  PUNTO_DE_VENTA {
    uuid id PK
  }
  ASIGNACION_EQUIPO_PUNTO {
    uuid id PK
    uuid punto_de_venta_id FK
    uuid equipo_id FK
    uuid semana_laboral_id FK
    datetime fecha_inicio
    datetime fecha_fin
    boolean activo
    uuid registrado_por_id FK
  }
  TABLA_COMISION {
    uuid id PK
    decimal precio_venta
    decimal monto_comision
    boolean activo
  }
  UMBRAL_LIDER {
    uuid id PK
    int ventas_desde
    int ventas_hasta
    decimal monto_comision_lider
    boolean activo
  }
  REGISTRO_COMISION {
    uuid id PK
    uuid venta_id FK
    uuid beneficiario_id FK
    uuid semana_laboral_id FK
    enum tipo
    decimal monto
    enum moneda
    boolean recalculado
    datetime fecha_calculo
  }
  PAGO_VENDEDOR {
    uuid id PK
    uuid vendedor_id FK
    uuid semana_laboral_id FK
    uuid tesorero_id FK
    decimal monto_comisiones_vendedor
    decimal monto_comisiones_equipo
    decimal monto_bonos_finde
    decimal monto_premios_juegos
    decimal total
    enum moneda
    date fecha_pago
  }
  RENDICION_EFECTIVO {
    uuid id PK
    uuid vendedor_id FK
    uuid lider_id FK
    uuid semana_laboral_id FK
    decimal monto
    enum moneda
    datetime fecha_rendicion
    text observaciones
  }
  LOTE_INGRESO_CUPONES {
    uuid id PK
    uuid cupon_id FK
    int cantidad
    uuid registrado_por_id FK
    datetime fecha_ingreso
    text observaciones
  }
  MOVIMIENTO_CUPON {
    uuid id PK
    uuid lote_id FK
    uuid equipo_id FK
    uuid vendedor_id FK
    enum tipo
    int cantidad
    uuid registrado_por_id FK
    datetime fecha
    text motivo
  }
  NOTIFICACION_INTERNA {
    uuid id PK
    uuid destinatario_id FK
    uuid venta_id FK
    enum tipo
    string titulo
    text mensaje
    boolean leida
    datetime fecha_creacion
    datetime fecha_lectura
  }
  LOG_AUDITORIA {
    uuid id PK
    uuid usuario_id FK
    enum operacion
    string entidad_tipo
    uuid entidad_id
    json datos_anteriores
    json datos_nuevos
    datetime fecha_hora
    string ip_origen
  }
  JUEGO {
    uuid id PK
    uuid encargado_id FK
    uuid ganador_id FK
    enum tipo
    date fecha
    enum estado
    decimal monto_premio
    enum moneda
    datetime fecha_cierre
  }
  REGISTRO_JUEGO {
    uuid id PK
    uuid juego_id FK
    uuid vendedor_id FK
    uuid robo_de_id FK
    int puntos
    string url_foto
    datetime fecha
  }
  PREMIO_JUEGO {
    uuid id PK
    uuid juego_id FK
    uuid vendedor_id FK
    decimal monto
    enum moneda
    date fecha
  }

  PUNTO_DE_VENTA ||--o{ ASIGNACION_EQUIPO_PUNTO : "tiene asignaciones"
  EQUIPO ||--o{ ASIGNACION_EQUIPO_PUNTO : "es asignado a"
  SEMANA_LABORAL ||--o{ ASIGNACION_EQUIPO_PUNTO : "en semana"
  VENTA ||--o{ REGISTRO_COMISION : "genera"
  USUARIO ||--o{ REGISTRO_COMISION : "recibe"
  SEMANA_LABORAL ||--o{ REGISTRO_COMISION : "agrupa"
  USUARIO ||--o{ PAGO_VENDEDOR : "recibe"
  SEMANA_LABORAL ||--o{ PAGO_VENDEDOR : "cubre"
  USUARIO ||--o{ RENDICION_EFECTIVO : "rinde"
  SEMANA_LABORAL ||--o{ RENDICION_EFECTIVO : "cubre"
  CUPON ||--o{ LOTE_INGRESO_CUPONES : "recibe lotes"
  LOTE_INGRESO_CUPONES ||--o{ MOVIMIENTO_CUPON : "origina"
  EQUIPO ||--o{ MOVIMIENTO_CUPON : "destino asig."
  USUARIO ||--o{ NOTIFICACION_INTERNA : "recibe"
  VENTA |o--o{ NOTIFICACION_INTERNA : "contexto"
  USUARIO ||--o{ LOG_AUDITORIA : "genera"
  USUARIO ||--o{ JUEGO : "gestiona"
  JUEGO ||--o{ REGISTRO_JUEGO : "tiene"
  USUARIO ||--o{ REGISTRO_JUEGO : "participa"
  JUEGO ||--o| PREMIO_JUEGO : "otorga"
  USUARIO ||--o{ PREMIO_JUEGO : "gana"
`;

try {
  const { svg } = await mermaid.render('erd2-svg', erd2def);
  document.getElementById('erd2').innerHTML = svg;

  // Post-process: round entity header corners
  document.querySelectorAll('#erd2 svg.erDiagram .node').forEach(node => {
    const firstPath = node.querySelector('path[d]');
    if (!firstPath) return;
    const d = firstPath.getAttribute('d');
    const nums = d.match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0], nums[2], nums[4], nums[6]];
    const ys = [nums[1], nums[3], nums[5], nums[7]];
    const x = Math.min(...xs), y = Math.min(...ys);
    const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', w); rect.setAttribute('height', h);
    rect.setAttribute('rx', '8');
    for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
      if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
    }
    firstPath.replaceWith(rect);
  });
  // Remove row borders
  document.querySelectorAll('#erd2 svg.erDiagram .row-rect-odd path, #erd2 svg.erDiagram .row-rect-even path').forEach(p => {
    p.setAttribute('stroke', 'none');
  });
} catch(e) {
  document.getElementById('erd2').innerHTML = `<span class="err-msg">Error al renderizar: ${e.message}</span>`;
}
</script>
